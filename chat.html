<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="icon" href="assets/favicon.ico">
</head>
<body class="chat-page">
    <header class="main-header chat-header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">
                    <span class="logo-icon">🤖</span>
                    <span class="logo-text">AmkyawDev</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="nav.home">ပင်မစာမျက်နှာ</a></li>
                <li><a href="chat.html" class="active" data-i18n="nav.chat">ချက်ခ်</a></li>
                <li><a href="dashboard.html" data-i18n="nav.dashboard">ဒက်ရှ်ဘုတ်</a></li>
            </ul>
            <div class="nav-actions">
                <button id="language-toggle" class="btn-icon" title="ဘာသာစကား ပြောင်းလဲရန်">
                    <span class="lang-code">မြန်မာ</span>
                </button>
                <div id="user-menu" class="user-menu hidden">
                    <button class="btn-icon user-avatar">
                        <span class="avatar-letter">U</span>
                    </button>
                    <div class="dropdown-menu">
                        <a href="dashboard.html" data-i18n="nav.dashboard">ဒက်ရှ်ဘုတ်</a>
                        <button id="logout-btn" data-i18n="nav.logout">ထွက်ရန်</button>
                    </div>
                </div>
                <a href="login.html" id="login-btn" class="btn btn-primary" data-i18n="nav.login">ဝင်ရန်</a>
            </div>
        </nav>
    </header>

    <main class="chat-container">
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="btn btn-primary btn-block">
                    <span class="icon">➕</span>
                    <span data-i18n="chat.newChat">ချက်ခ်အသစ်</span>
                </button>
            </div>
            <div class="chat-history">
                <h3 data-i18n="chat.history">ချက်ခ်မှတ်တမ်း</h3>
                <ul id="chat-list" class="chat-list">
                    <!-- Chat history items will be loaded here -->
                </ul>
            </div>
        </aside>

        <section class="chat-main">
            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message">
                    <div class="welcome-icon">🤖</div>
                    <h2 data-i18n="chat.welcome">AmkyawDev မှ မင်္ဂလာပါ</h2>
                    <p data-i18n="chat.welcomeDesc">မေးလျှင်းလိုသောအရာကို ရိုက်ပါ့မယ်။ မြန်မာလို မေးလျှင် မြန်မာလိုပြန်ဖြေပါ့မယ်။</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <textarea 
                        id="chat-input" 
                        placeholder="မေးလျှင်းလိုသောအရာကို ရိုက်ပါ့မယ်..." 
                        rows="1"
                        data-i18n-placeholder="chat.placeholder"
                    ></textarea>
                    <div class="input-actions">
                        <button id="send-btn" class="btn btn-primary" title="ပါ့မယ်">
                            <span class="icon">➤</span>
                        </button>
                    </div>
                </div>
                <div class="input-tools">
                    <button id="voice-input-btn" class="btn-icon" title="အသံဖြင့်ရိုက်ပါ့မယ်">
                        <span class="icon">🎙️</span>
                    </button>
                    <button id="clear-btn" class="btn-icon" title="ရှင်းလင်းရန်">
                        <span class="icon">🗑️</span>
                    </button>
                </div>
                <div class="token-count">
                    <span data-i18n="chat.tokens">Token များ:</span>
                    <span id="token-count">0</span>
                </div>
            </div>

            <div class="model-selector">
                <label data-i18n="chat.model">မော်ဒယ်:</label>
                <select id="model-select">
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-3.5-turbo" selected>GPT-3.5</option>
                    <option value="claude-3-opus">Claude</option>
                    <option value="llama-3">Llama</option>
                </select>
            </div>
        </section>

        <aside class="chat-settings">
            <h3 data-i18n="settings.title">ဆက်တင်များ</h3>
            
            <div class="setting-group">
                <label data-i18n="settings.temperature">Temperature:</label>
                <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                <span id="temperature-value">0.7</span>
            </div>

            <div class="setting-group">
                <label data-i18n="settings.maxTokens">Max Tokens:</label>
                <input type="number" id="max-tokens" value="2048" min="1" max="32000">
            </div>

            <div class="setting-group">
                <label data-i18n="settings.responseStyle">ပြန်လည်ဖော်ပြပါ့မယ်:</label>
                <select id="response-style">
                    <option value="concise" data-i18n="settings.style.concise">တိုတယ်</option>
                    <option value="balanced" selected data-i18n="settings.style.balanced">ပါးလွှား</option>
                    <option value="detailed" data-i18n="settings.style.detailed">အသေးစိတ်</option>
                </select>
            </div>

            <div class="setting-group">
                <label data-i18n="settings.features">အင်္ဂါရပ်များ:</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="streaming-toggle" checked>
                        <span data-i18n="settings.streaming">Streaming</span>
                    </label>
                    <label>
                        <input type="checkbox" id="caching-toggle" checked>
                        <span data-i18n="settings.caching">Caching</span>
                    </label>
                    <label>
                        <input type="checkbox" id="retry-toggle" checked>
                        <span data-i18n="settings.retry">Retry</span>
                    </label>
                </div>
            </div>
        </aside>
    </main>

    <div id="loading-indicator" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p data-i18n="chat.loading">တင်နေပါ့မယ်...</p>
    </div>

    <script src="config/env.js"></script>
    <script src="config/firebase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ai_api.js"></script>
    <script src="js/chat_engine.js"></script>
    <script src="js/firebase_auth.js"></script>
    <script src="js/ui_controller.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
